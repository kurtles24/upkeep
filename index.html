};

function MaintenanceTracker({ onLogout, userEmail } = {}) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState("home");
  const [statusFilter, setStatusFilter] = useState(null);
  const [editingItem, setEditingItem] = useState(null);
  const [showAddForm, setShowAddForm] = useState(false);
  const [newItem, setNewItem] = useState({ name: "", interval: 90, icon: "🔧", notes: "" });
  const [confirmReset, setConfirmReset] = useState(false);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [editingInterval, setEditingInterval] = useState(null);
  const [intervalValue, setIntervalValue] = useState("");
  const [showExport, setShowExport] = useState(false);
  const [copySuccess, setCopySuccess] = useState(false);
  const [editingTabName, setEditingTabName] = useState(false);
  const [tabNameValue, setTabNameValue] = useState("");

  // Load data, merging in any new default items
  useEffect(() => {
    // Items that were moved to a different category and should be auto-removed
    const relocatedItems = { person: new Set(["p10", "p11"]), car: new Set(["c13", "c10"]) };

    const mergeDefaults = (saved, category, deletedIds, customIntervals) => {
      const defaultMap = new Map(DEFAULT_ITEMS[category].map((d) => [d.id, d]));
      const removals = relocatedItems[category] || new Set();
      // Remove relocated items, then sync default fields into existing items
      const patched = saved
        .filter((item) => !removals.has(item.id))
        .map((item) => {
          const def = defaultMap.get(item.id);
          if (def) {
            return {
              ...item,
              name: def.name,
              interval: customIntervals[item.id] !== undefined ? customIntervals[item.id] : def.interval,
              criticality: def.criticality,
              notes: def.notes,
              icon: def.icon,
            };
          }
          return item;
        });
      const existingIds = new Set(patched.map((i) => i.id));
      const newDefaults = DEFAULT_ITEMS[category]
        .filter((d) => !existingIds.has(d.id) && !deletedIds.has(d.id))
        .map((d) => ({ ...d, lastDone: null, history: [] }));
      return [...patched, ...newDefaults];
    };

    const load = async () => {
      let hasExistingData = false;
      try {
        const result = await window.storage.get(STORAGE_KEY);
        if (result && result.value) {
          hasExistingData = true;
          const saved = JSON.parse(result.value);
          const deletedIds = new Set(saved._deleted || []);
          const customIntervals = saved._customIntervals || {};
          const merged = {
            home: mergeDefaults(saved.home || [], "home", deletedIds, customIntervals),
            car: mergeDefaults(saved.car || [], "car", deletedIds, customIntervals),
            hottub: mergeDefaults(saved.hottub || [], "hottub", deletedIds, customIntervals),
            yard: mergeDefaults(saved.yard || [], "yard", deletedIds, customIntervals),
            person: mergeDefaults(saved.person || [], "person", deletedIds, customIntervals),
            banjo: mergeDefaults(saved.banjo || [], "banjo", deletedIds, customIntervals),
            _deleted: saved._deleted || [],
            _customIntervals: customIntervals,
          };
          setData(merged);
          if (JSON.stringify(merged) !== result.value) {
            try { await window.storage.set(STORAGE_KEY, JSON.stringify(merged)); } catch {}
          }
        }
      } catch (err) {
        console.error("Error loading data:", err);
        // If we had existing data but merge failed, don't overwrite — just use raw saved data
        if (hasExistingData) {
          try {
            const result = await window.storage.get(STORAGE_KEY);
            if (result && result.value) {
              setData(JSON.parse(result.value));
              setLoading(false);
              return;
            }
          } catch {}
        }
      }
      // Only initialize fresh if there was truly no data
      if (!hasExistingData) {
        const init = {
          home: DEFAULT_ITEMS.home.map((i) => ({ ...i, lastDone: null, history: [] })),
          car: DEFAULT_ITEMS.car.map((i) => ({ ...i, lastDone: null, history: [] })),
          hottub: DEFAULT_ITEMS.hottub.map((i) => ({ ...i, lastDone: null, history: [] })),
          yard: DEFAULT_ITEMS.yard.map((i) => ({ ...i, lastDone: null, history: [] })),
          person: DEFAULT_ITEMS.person.map((i) => ({ ...i, lastDone: null, history: [] })),
          banjo: DEFAULT_ITEMS.banjo.map((i) => ({ ...i, lastDone: null, history: [] })),
          _deleted: [],
          _customIntervals: {},
        };
        setData(init);
        try { await window.storage.set(STORAGE_KEY, JSON.stringify(init)); } catch {}
      }
      setLoading(false);
    };
    load();
  }, []);

  const save = useCallback(async (newData) => {
    setData(newData);
    try {
      // Save a backup before writing new data
      const current = await window.storage.get(STORAGE_KEY);
      if (current && current.value) {
        await window.storage.set(STORAGE_KEY + "-backup", current.value);
      }
      await window.storage.set(STORAGE_KEY, JSON.stringify(newData));
    } catch {}
  }, []);

  const exportData = async () => {
    const json = JSON.stringify(data, null, 2);
    try {
      await navigator.clipboard.writeText(json);
      setCopySuccess(true);
      setTimeout(() => setCopySuccess(false), 2000);
    } catch {
      // Fallback: show the data in the export panel
      setShowExport(true);
    }
  };

  const importFromText = (text) => {
    try {
      const imported = JSON.parse(text);
      if (imported.home && imported.car) {
        save(imported);
        setShowExport(false);
      }
    } catch {}
  };

  const restoreBackup = async () => {
    try {
      const backup = await window.storage.get(STORAGE_KEY + "-backup");
      if (backup && backup.value) {
        const restored = JSON.parse(backup.value);
        await save(restored);
      }
    } catch {}
  };

  const markDone = (category, itemId, date) => {
    const now = new Date();
    const localToday = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")}`;
    const d = date || localToday;
    const updated = { ...data };
    updated[category] = updated[category].map((item) => {
      if (item.id !== itemId) return item;
      const existing = item.history || [];
      if (existing.includes(d)) return item; // prevent duplicate dates
      const history = [...existing, d].sort();
      return { ...item, lastDone: history[history.length - 1], history };
    });
    save(updated);
    setEditingItem(null);
  };

  const removeHistoryDate = (category, itemId, date) => {
    const updated = { ...data };
    updated[category] = updated[category].map((item) => {
      if (item.id !== itemId) return item;
      const history = (item.history || []).filter((d) => d !== date);
      const lastDone = history.length > 0 ? history.sort()[history.length - 1] : null;
      return { ...item, lastDone, history };
    });
    save(updated);
  };

  const deleteItem = (category, itemId) => {
    const updated = { ...data };
    updated[category] = updated[category].filter((i) => i.id !== itemId);
    // Track deleted default items so merge doesn't re-add them
    updated._deleted = [...(updated._deleted || []), itemId];
    save(updated);
  };

  const updateInterval = (category, itemId, newInterval) => {
    const days = parseInt(newInterval);
    if (!days || days < 1) return;
    const updated = { ...data };
    updated[category] = updated[category].map((item) =>
      item.id === itemId ? { ...item, interval: days } : item
    );
    // Track custom intervals so merge doesn't overwrite them
    updated._customIntervals = { ...(updated._customIntervals || {}), [itemId]: days };
    save(updated);
    setEditingInterval(null);
  };

  const addItem = (category) => {
    if (!newItem.name.trim()) return;
    const updated = { ...data };
    const id = `${category[0]}${Date.now()}`;
    updated[category] = [
      ...updated[category],
      { ...newItem, id, lastDone: null, history: [] },
    ];
    save(updated);
    setNewItem({ name: "", interval: 90, icon: "🔧", notes: "" });
    setShowAddForm(false);
  };

  const resetAll = async () => {
    const init = {
      home: DEFAULT_ITEMS.home.map((i) => ({ ...i, lastDone: null, history: [] })),
      car: DEFAULT_ITEMS.car.map((i) => ({ ...i, lastDone: null, history: [] })),
      hottub: DEFAULT_ITEMS.hottub.map((i) => ({ ...i, lastDone: null, history: [] })),
      yard: DEFAULT_ITEMS.yard.map((i) => ({ ...i, lastDone: null, history: [] })),
      person: DEFAULT_ITEMS.person.map((i) => ({ ...i, lastDone: null, history: [] })),
      banjo: DEFAULT_ITEMS.banjo.map((i) => ({ ...i, lastDone: null, history: [] })),
      _deleted: [],
      _customIntervals: {},
    };
    await save(init);
    setConfirmReset(false);
  };

  if (loading) {
    return (
      <div style={{
        minHeight: "100vh", background: "#09090b", display: "flex",
        alignItems: "center", justifyContent: "center", fontFamily: "'JetBrains Mono', monospace",
      }}>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
        <div style={{ color: "#71717a", fontSize: 14 }}>Loading...</div>
      </div>
    );
  }

  const categories = ["home", "car", "hottub", "yard", "person", "banjo"];
  const categoryLabels = { home: "🏠", car: "🚗", hottub: "♨️", yard: "🌿", person: "🧑", banjo: "🐕" };
  const defaultTabNames = { home: "🏠 Home", car: "🚗 Car", hottub: "♨️ Hot Tub", yard: "🌿 Yard", person: "🧑 Kurt", banjo: "🐕 Banjo" };
  const getTabName = (tab) => (data._tabNames && data._tabNames[tab]) || defaultTabNames[tab];

  // When a status filter is active, show items from ALL categories matching that status
  const allItems = statusFilter
    ? categories.flatMap((c) => (data[c] || []).map((item) => ({ ...item, _category: c })))
        .filter((item) => getStatus(getDaysUntilDue(item.lastDone, item.interval)) === statusFilter)
    : (data[activeTab] || []).map((item) => ({ ...item, _category: activeTab }));

  const sorted = [...allItems].sort((a, b) => {
    const da = getDaysUntilDue(a.lastDone, a.interval);
    const db = getDaysUntilDue(b.lastDone, b.interval);
    const order = { overdue: 0, soon: 1, good: 2, unknown: 3 };
    const sa = getStatus(da);
    const sb = getStatus(db);
    if (order[sa] !== order[sb]) return order[sa] - order[sb];
    if (da !== db) return da - db;
    return (b.criticality || 0) - (a.criticality || 0);
  });

  // Counts are always across all categories for the summary strip
  const allCategoryItems = categories.flatMap((c) => (data[c] || []));
  const counts = { overdue: 0, soon: 0, good: 0, unknown: 0 };
  allCategoryItems.forEach((i) => { counts[getStatus(getDaysUntilDue(i.lastDone, i.interval))]++; });

  return (
    <div style={{
      minHeight: "100vh", background: "#09090b", color: "#e4e4e7",
      fontFamily: "'JetBrains Mono', monospace", padding: "0 0 80px 0",
    }}>
      <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ padding: "16px 24px 4px", borderBottom: "1px solid #1e1e22", background: "#09090b" }}>
        <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 0, marginLeft: -24 }}>
          <div style={{ width: 140, display: "flex", justifyContent: "center" }}>
            <svg width="120" height="50" viewBox="0 0 120 50" style={{ overflow: "visible" }}>
              <defs>
                <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stopColor="#22c55e" />
                  <stop offset="50%" stopColor="#eab308" />
                  <stop offset="100%" stopColor="#ef4444" />
                </linearGradient>
              </defs>
              <path d="M 15 45 A 45 45 0 0 1 105 45" fill="none" stroke="url(#arcGrad)" strokeWidth="5" strokeLinecap="round" />
              <line x1="60" y1="45" x2="83" y2="14" stroke="#e4e4e7" strokeWidth="1.5" strokeLinecap="round" />
              <circle cx="60" cy="45" r="2.5" fill="#e4e4e7" />
            </svg>
          </div>
          <div style={{ width: 140, display: "flex", justifyContent: "center", marginTop: -2, paddingLeft: 5 }}>
            <span style={{
              fontSize: 18, fontWeight: 800, letterSpacing: "5px",
              fontFamily: "'DM Sans', sans-serif",
              color: "#e4e4e7",
            }}>
              UPKEEP
            </span>
          </div>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 0, padding: "0 16px", borderBottom: "1px solid #1e1e22", overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
        {["home", "car", "hottub", "yard", "person", "banjo"].map((tab) => {
          const tabItems = data[tab] || [];
          const worstOrder = { overdue: 0, soon: 1, good: 2, unknown: 3 };
          const worstStatus = tabItems.reduce((worst, item) => {
            const s = getStatus(getDaysUntilDue(item.lastDone, item.interval));
            return worstOrder[s] < worstOrder[worst] ? s : worst;
          }, "unknown");
          const tabStatusColors = {
            overdue: "#ef4444",
            soon: "#eab308",
            good: "#22c55e",
            unknown: "#52525b",
          };
          const inactiveColor = tabStatusColors[worstStatus];
          return (
            <button
              key={tab}
              onClick={() => { setActiveTab(tab); setStatusFilter(null); setShowAddForm(false); setEditingItem(null); }}
              style={{
                padding: "14px 16px", fontSize: 11, fontWeight: 600, letterSpacing: "1.5px",
                textTransform: "uppercase", border: "none", cursor: "pointer",
                background: "transparent", fontFamily: "inherit",
                color: activeTab === tab ? "#e4e4e7" : inactiveColor,
                borderBottom: activeTab === tab ? `2px solid ${inactiveColor}` : "2px solid transparent",
                transition: "all 0.2s",
              }}
            >
              {getTabName(tab)}
            </button>
          );
        })}
      </div>

      {/* Summary strip */}
      <div style={{
        display: "flex", gap: 12, padding: "16px 24px", borderBottom: "1px solid #1e1e22",
        overflowX: "auto",
      }}>
        {[
          { key: "overdue", label: "Overdue" },
          { key: "soon", label: "Due Soon" },
          { key: "good", label: "On Track" },
          { key: "unknown", label: "Not Set" },
        ].map(({ key, label }) => {
          const isActive = statusFilter === key;
          return (
            <div
              key={key}
              onClick={() => { setStatusFilter(isActive ? null : key); setEditingItem(null); }}
              style={{
                display: "flex", alignItems: "center", gap: 8, padding: "6px 12px",
                background: statusColors[key].bg,
                border: isActive ? `2px solid ${statusColors[key].border}` : `1px solid ${statusColors[key].border}33`,
                borderRadius: 6, whiteSpace: "nowrap", cursor: "pointer",
                opacity: statusFilter && !isActive ? 0.4 : 1,
                transition: "all 0.2s",
              }}
            >
              <span style={{
                width: 20, height: 20, borderRadius: 4, display: "flex", alignItems: "center",
                justifyContent: "center", fontSize: 11, fontWeight: 700,
                background: statusColors[key].badge, color: statusColors[key].badgeText,
              }}>
                {counts[key]}
              </span>
              <span style={{ fontSize: 11, color: statusColors[key].text, fontWeight: 500 }}>{label}</span>
            </div>
          );
        })}
      </div>
      {/* Filter label */}
      {statusFilter && (
        <div style={{
          padding: "10px 24px", borderBottom: "1px solid #1e1e22",
          display: "flex", alignItems: "center", justifyContent: "space-between",
        }}>
          <span style={{ fontSize: 11, color: "#a1a1aa", fontWeight: 500 }}>
            Showing all <span style={{ color: statusColors[statusFilter].text }}>{statusFilter === "soon" ? "due soon" : statusFilter === "good" ? "on track" : statusFilter === "unknown" ? "not set" : "overdue"}</span> items across all categories
          </span>
          <button
            onClick={() => setStatusFilter(null)}
            style={{
              padding: "4px 10px", fontSize: 10, border: "1px solid #3f3f46",
              borderRadius: 4, cursor: "pointer", background: "transparent",
              color: "#71717a", fontFamily: "inherit",
            }}
          >
            Clear
          </button>
        </div>
      )}

      {/* Items */}
      <div style={{ padding: "16px 24px" }}>
        {sorted.map((item) => {
          const daysLeft = getDaysUntilDue(item.lastDone, item.interval);
          const status = getStatus(daysLeft);
          const sc = statusColors[status];
          const isEditing = editingItem === item.id;

          return (
            <div key={item.id} style={{
              marginBottom: 10, border: `1px solid ${sc.border}44`,
              borderRadius: 8, background: sc.bg, overflow: "hidden",
              transition: "all 0.2s",
            }}>
              <div
                onClick={() => setEditingItem(isEditing ? null : item.id)}
                style={{
                  padding: "14px 16px", cursor: "pointer", display: "flex",
                  alignItems: "center", gap: 12,
                }}
              >
                <span style={{ fontSize: 20, flexShrink: 0 }}>{item.icon}</span>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{
                    display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap",
                  }}>
                    <span style={{
                      fontSize: 13, fontWeight: 600, color: "#e4e4e7",
                      fontFamily: "'DM Sans', sans-serif",
                    }}>
                      {statusFilter && (
                        <span style={{ marginRight: 6 }}>{categoryLabels[item._category]}</span>
                      )}
                      {item.name}
                    </span>
                    <span style={{
                      fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 3,
                      background: sc.badge, color: sc.badgeText, letterSpacing: "0.5px",
                    }}>
                      {statusLabel[status]}
                    </span>
                  </div>
                  <div style={{ fontSize: 11, color: "#a1a1aa", marginTop: 3 }}>
                    {status === "unknown"
                      ? "No date recorded"
                      : status === "overdue"
                        ? `${formatInterval(Math.abs(daysLeft))} overdue`
                        : `${formatInterval(daysLeft)} remaining`}
                    <span style={{ margin: "0 6px", color: "#52525b" }}>·</span>
                    Every {formatInterval(item.interval)}
                    <span style={{ margin: "0 6px", color: "#52525b" }}>·</span>
                    Last: {formatDate(item.lastDone)}
                  </div>
                </div>
                {item.criticality && (
                  <div style={{ flexShrink: 0, marginRight: 4 }}>
                    <CriticalityDial level={item.criticality} size={44} />
                  </div>
                )}
                <span style={{
                  fontSize: 14, color: "#52525b", transform: isEditing ? "rotate(180deg)" : "none",
                  transition: "transform 0.2s",
                }}>
                  ▾
                </span>
              </div>

              {isEditing && (
                <div style={{
                  padding: "0 16px 14px", borderTop: `1px solid ${sc.border}33`,
                }}>
                  <p style={{ fontSize: 11, color: "#d4d4d8", margin: "10px 0 6px", lineHeight: 1.5 }}>
                    {item.notes}
                  </p>
                  <div style={{ fontSize: 11, color: "#a1a1aa", margin: "0 0 8px", fontWeight: 500, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                    {editingInterval === item.id ? (
                      <>
                        <span>Interval: every</span>
                        <input
                          type="number"
                          autoFocus
                          value={intervalValue}
                          onClick={(e) => e.stopPropagation()}
                          onChange={(e) => setIntervalValue(e.target.value)}
                          onKeyDown={(e) => {
                            e.stopPropagation();
                            if (e.key === "Enter") updateInterval(item._category, item.id, intervalValue);
                            if (e.key === "Escape") setEditingInterval(null);
                          }}
                          style={{
                            width: 60, padding: "3px 6px", fontSize: 11, border: "1px solid #3f3f46",
                            borderRadius: 4, background: "#18181b", color: "#e4e4e7",
                            fontFamily: "inherit", textAlign: "center",
                          }}
                        />
                        <span>days</span>
                        <button
                          onClick={(e) => { e.stopPropagation(); updateInterval(item._category, item.id, intervalValue); }}
                          style={{
                            padding: "3px 8px", fontSize: 10, fontWeight: 600, border: "none",
                            borderRadius: 3, cursor: "pointer", background: "#e4e4e7",
                            color: "#09090b", fontFamily: "inherit",
                          }}
                        >
                          SAVE
                        </button>
                        <button
                          onClick={(e) => { e.stopPropagation(); setEditingInterval(null); }}
                          style={{
                            padding: "3px 8px", fontSize: 10, border: "1px solid #3f3f46",
                            borderRadius: 3, cursor: "pointer", background: "transparent",
                            color: "#71717a", fontFamily: "inherit",
                          }}
                        >
                          Cancel
                        </button>
                      </>
                    ) : (
                      <>
                        <span>Interval: every {formatInterval(item.interval)}</span>
                        <button
                          onClick={(e) => { e.stopPropagation(); setEditingInterval(item.id); setIntervalValue(String(item.interval)); }}
                          style={{
                            padding: "2px 6px", fontSize: 9, border: "1px solid #3f3f46",
                            borderRadius: 3, cursor: "pointer", background: "transparent",
                            color: "#71717a", fontFamily: "inherit",
                          }}
                        >
                          Edit
                        </button>
                      </>
                    )}
                  </div>
                  {item.history && item.history.length > 0 && (
                    <div style={{ margin: "0 0 12px" }}>
                      <span style={{ fontSize: 10, color: "#71717a", fontWeight: 500, letterSpacing: "0.5px" }}>
                        HISTORY
                      </span>
                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 6 }}>
                        {[...item.history].sort().reverse().map((date) => (
                          <div key={date} style={{
                            display: "flex", alignItems: "center", gap: 4,
                            padding: "3px 8px", background: "#18181b",
                            border: "1px solid #3f3f46", borderRadius: 4,
                          }}>
                            <span style={{ fontSize: 11, color: "#d4d4d8" }}>{formatDate(date)}</span>
                            <button
                              onClick={(e) => { e.stopPropagation(); removeHistoryDate(item._category, item.id, date); }}
                              style={{
                                background: "none", border: "none", cursor: "pointer",
                                color: "#71717a", fontSize: 13, padding: "0 2px",
                                lineHeight: 1, fontFamily: "inherit",
                              }}
                              title="Remove this date"
                            >
                              ×
                            </button>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "stretch" }}>
                    <button
                      onClick={(e) => { e.stopPropagation(); markDone(item._category, item.id); }}
                      style={{
                        padding: "8px 16px", fontSize: 11, fontWeight: 600, border: "none",
                        borderRadius: 5, cursor: "pointer", background: "#e4e4e7",
                        color: "#09090b", fontFamily: "inherit", letterSpacing: "0.5px",
                      }}
                    >
                      ✓ DONE TODAY
                    </button>
                    <div style={{
                      display: "flex", alignItems: "center", gap: 6,
                      padding: "0 10px", border: "1px solid #3f3f46",
                      borderRadius: 5, background: "#18181b",
                    }}>
                      <label style={{ fontSize: 10, color: "#a1a1aa", whiteSpace: "nowrap", fontWeight: 500 }}>
                        Or pick date:
                      </label>
                      <input
                        type="date"
                        id={`date-${item.id}`}
                        onClick={(e) => e.stopPropagation()}
                        onChange={(e) => e.stopPropagation()}
                        onKeyDown={(e) => {
                          e.stopPropagation();
                          if (e.key === "Enter" && e.target.value) {
                            markDone(item._category, item.id, e.target.value);
                            e.target.value = "";
                          }
                        }}
                        style={{
                          padding: "8px 4px", fontSize: 11, border: "none",
                          background: "transparent", color: "#e4e4e7",
                          fontFamily: "inherit", cursor: "pointer",
                        }}
                      />
                      <button
                        onClick={(e) => {
                          e.stopPropagation();
                          const input = document.getElementById(`date-${item.id}`);
                          if (input && input.value) {
                            markDone(item._category, item.id, input.value);
                            input.value = "";
                          }
                        }}
                        style={{
                          padding: "4px 10px", fontSize: 10, fontWeight: 600, border: "none",
                          borderRadius: 3, cursor: "pointer", background: "#e4e4e7",
                          color: "#09090b", fontFamily: "inherit", whiteSpace: "nowrap",
                        }}
                      >
                        SAVE
                      </button>
                    </div>
                    {confirmDelete === item.id ? (
                      <div style={{
                        display: "flex", alignItems: "center", gap: 8, marginLeft: "auto",
                        padding: "4px 10px", background: "#1c1012", border: "1px solid #b91c1c44",
                        borderRadius: 5,
                      }}>
                        <span style={{ fontSize: 11, color: "#fca5a5", whiteSpace: "nowrap" }}>Delete this item?</span>
                        <button
                          onClick={(e) => { e.stopPropagation(); deleteItem(item._category, item.id); setConfirmDelete(null); }}
                          style={{
                            padding: "4px 10px", fontSize: 10, fontWeight: 700, border: "none",
                            borderRadius: 4, cursor: "pointer", background: "#dc2626",
                            color: "#fff", fontFamily: "inherit", letterSpacing: "0.5px",
                          }}
                        >
                          YES
                        </button>
                        <button
                          onClick={(e) => { e.stopPropagation(); setConfirmDelete(null); }}
                          style={{
                            padding: "4px 10px", fontSize: 10, fontWeight: 500, border: "1px solid #3f3f46",
                            borderRadius: 4, cursor: "pointer", background: "transparent",
                            color: "#a1a1aa", fontFamily: "inherit",
                          }}
                        >
                          NO
                        </button>
                      </div>
                    ) : (
                      <button
                        onClick={(e) => { e.stopPropagation(); setConfirmDelete(item.id); }}
                        style={{
                          padding: "8px 12px", fontSize: 11, fontWeight: 500, border: "1px solid #3f3f4633",
                          borderRadius: 5, cursor: "pointer", background: "transparent",
                          color: "#71717a", fontFamily: "inherit", marginLeft: "auto",
                        }}
                      >
                        Delete Item
                      </button>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        })}

        {/* Status filter empty state */}
        {statusFilter && sorted.length === 0 && (
          <div style={{
            padding: "40px 20px", textAlign: "center",
          }}>
            <span style={{ fontSize: 28 }}>✅</span>
            <p style={{ fontSize: 13, color: "#a1a1aa", marginTop: 12, fontFamily: "'DM Sans', sans-serif" }}>
              No items with this status — nice!
            </p>
          </div>
        )}

        {/* Add form */}
        {!statusFilter && (showAddForm ? (
          <div style={{
            border: "1px dashed #3f3f46", borderRadius: 8, padding: 16,
            marginTop: 10, background: "#0f0f12",
          }}>
            <div style={{ fontSize: 12, fontWeight: 600, marginBottom: 12, color: "#a1a1aa" }}>
              Add Custom Item
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <div style={{ display: "flex", gap: 8 }}>
                <input
                  value={newItem.icon}
                  onChange={(e) => setNewItem({ ...newItem, icon: e.target.value })}
                  style={{
                    width: 44, padding: "8px", fontSize: 18, border: "1px solid #3f3f46",
                    borderRadius: 5, background: "#18181b", color: "#e4e4e7",
                    textAlign: "center", fontFamily: "inherit",
                  }}
                  placeholder="🔧"
                />
                <input
                  value={newItem.name}
                  onChange={(e) => setNewItem({ ...newItem, name: e.target.value })}
                  style={{
                    flex: 1, padding: "8px 12px", fontSize: 12, border: "1px solid #3f3f46",
                    borderRadius: 5, background: "#18181b", color: "#e4e4e7", fontFamily: "inherit",
                  }}
                  placeholder="Item name"
                />
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                <label style={{ fontSize: 11, color: "#71717a", whiteSpace: "nowrap" }}>Every</label>
                <input
                  type="number"
                  value={newItem.interval}
                  onChange={(e) => setNewItem({ ...newItem, interval: parseInt(e.target.value) || 30 })}
                  style={{
                    width: 70, padding: "8px", fontSize: 12, border: "1px solid #3f3f46",
                    borderRadius: 5, background: "#18181b", color: "#e4e4e7",
                    fontFamily: "inherit", textAlign: "center",
                  }}
                />
                <label style={{ fontSize: 11, color: "#71717a" }}>days</label>
              </div>
              <input
                value={newItem.notes}
                onChange={(e) => setNewItem({ ...newItem, notes: e.target.value })}
                style={{
                  padding: "8px 12px", fontSize: 12, border: "1px solid #3f3f46",
                  borderRadius: 5, background: "#18181b", color: "#e4e4e7", fontFamily: "inherit",
                }}
                placeholder="Notes (optional)"
              />
              <div style={{ display: "flex", gap: 8 }}>
                <button
                  onClick={() => addItem(activeTab)}
                  style={{
                    padding: "8px 20px", fontSize: 11, fontWeight: 600, border: "none",
                    borderRadius: 5, cursor: "pointer", background: "#e4e4e7",
                    color: "#09090b", fontFamily: "inherit",
                  }}
                >
                  ADD
                </button>
                <button
                  onClick={() => { setShowAddForm(false); setNewItem({ name: "", interval: 90, icon: "🔧", notes: "" }); }}
                  style={{
                    padding: "8px 16px", fontSize: 11, border: "1px solid #3f3f46",
                    borderRadius: 5, cursor: "pointer", background: "transparent",
                    color: "#71717a", fontFamily: "inherit",
                  }}
                >
                  Cancel
                </button>
              </div>
            </div>
          </div>
        ) : (
          <button
            onClick={() => setShowAddForm(true)}
            style={{
              width: "100%", padding: "14px", fontSize: 12, fontWeight: 500,
              border: "1px dashed #3f3f46", borderRadius: 8, cursor: "pointer",
              background: "transparent", color: "#52525b", fontFamily: "inherit",
              marginTop: 10, letterSpacing: "0.5px",
            }}
          >
            + ADD CUSTOM ITEM
          </button>
        ))}

        {/* Edit Tab Name */}
        {!statusFilter && (
          <div style={{ marginTop: 16, display: "flex", justifyContent: "center" }}>
            {editingTabName ? (
              <div style={{
                display: "flex", alignItems: "center", gap: 8,
                padding: "8px 12px", border: "1px solid #3f3f46",
                borderRadius: 6, background: "#0f0f12",
              }}>
                <input
                  autoFocus
                  value={tabNameValue}
                  onChange={(e) => setTabNameValue(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === "Enter" && tabNameValue.trim()) {
                      const updated = { ...data, _tabNames: { ...(data._tabNames || {}), [activeTab]: tabNameValue.trim() } };
                      save(updated);
                      setEditingTabName(false);
                    }
                    if (e.key === "Escape") setEditingTabName(false);
                  }}
                  style={{
                    padding: "6px 10px", fontSize: 11, border: "1px solid #3f3f46",
                    borderRadius: 4, background: "#18181b", color: "#e4e4e7",
                    fontFamily: "inherit", width: 150,
                  }}
                  placeholder="Tab name"
                />
                <button
                  onClick={() => {
                    if (tabNameValue.trim()) {
                      const updated = { ...data, _tabNames: { ...(data._tabNames || {}), [activeTab]: tabNameValue.trim() } };
                      save(updated);
                      setEditingTabName(false);
                    }
                  }}
                  style={{
                    padding: "6px 10px", fontSize: 10, fontWeight: 600, border: "none",
                    borderRadius: 4, cursor: "pointer", background: "#e4e4e7",
                    color: "#09090b", fontFamily: "inherit",
                  }}
                >
                  SAVE
                </button>
                <button
                  onClick={() => setEditingTabName(false)}
                  style={{
                    padding: "6px 10px", fontSize: 10, border: "1px solid #3f3f46",
                    borderRadius: 4, cursor: "pointer", background: "transparent",
                    color: "#71717a", fontFamily: "inherit",
                  }}
                >
                  Cancel
                </button>
              </div>
            ) : (
              <button
                onClick={() => { setEditingTabName(true); setTabNameValue(getTabName(activeTab)); }}
                style={{
                  padding: "8px 16px", fontSize: 10, border: "1px solid #27272a",
                  borderRadius: 5, cursor: "pointer", background: "transparent",
                  color: "#3f3f46", fontFamily: "inherit", letterSpacing: "0.5px",
                }}
              >
                ✏️ EDIT TAB NAME
              </button>
            )}
          </div>
        )}
      </div>

      {/* Footer - Data Management */}
      <div style={{
        padding: "20px 24px", borderTop: "1px solid #1e1e22",
        display: "flex", flexDirection: "column", gap: 12, alignItems: "center",
      }}>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", justifyContent: "center" }}>
          <button
            onClick={() => setShowExport(!showExport)}
            style={{
              padding: "8px 14px", fontSize: 10, border: "1px solid #27272a",
              borderRadius: 5, cursor: "pointer", background: "transparent",
              color: "#71717a", fontFamily: "inherit", letterSpacing: "0.5px",
            }}
          >
            📤 EXPORT / IMPORT
          </button>
          <button
            onClick={restoreBackup}
            style={{
              padding: "8px 14px", fontSize: 10, border: "1px solid #27272a",
              borderRadius: 5, cursor: "pointer", background: "transparent",
              color: "#71717a", fontFamily: "inherit", letterSpacing: "0.5px",
            }}
          >
            ↩️ RESTORE LAST SAVE
          </button>
        </div>
        {showExport && (
          <div style={{
            width: "100%", display: "flex", flexDirection: "column", gap: 8,
          }}>
            <p style={{ fontSize: 10, color: "#71717a", margin: 0, textAlign: "center" }}>
              Select all text in the box, then use Ctrl+C / Cmd+C to copy. To restore, paste and click Import.
            </p>
            <textarea
              id="export-textarea"
              defaultValue={JSON.stringify(data)}
              onClick={(e) => e.target.select()}
              style={{
                width: "100%", height: 120, padding: 10, fontSize: 10,
                border: "1px solid #27272a", borderRadius: 5,
                background: "#18181b", color: "#a1a1aa",
                fontFamily: "inherit", resize: "vertical",
                boxSizing: "border-box",
              }}
            />
            <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
              <button
                onClick={() => {
                  const el = document.getElementById("export-textarea");
                  if (el) {
                    try {
                      const parsed = JSON.parse(el.value.trim());
                      if (parsed.home && parsed.car) {
                        save(parsed);
                        setShowExport(false);
                      }
                    } catch {}
                  }
                }}
                style={{
                  padding: "6px 14px", fontSize: 10, border: "none", borderRadius: 4,
                  cursor: "pointer", background: "#e4e4e7", color: "#09090b", fontFamily: "inherit",
                }}
              >
                IMPORT FROM ABOVE
              </button>
            </div>
          </div>
        )}
        {!confirmReset ? (
          <button
            onClick={() => setConfirmReset(true)}
            style={{
              padding: "8px 16px", fontSize: 10, border: "1px solid #27272a",
              borderRadius: 5, cursor: "pointer", background: "transparent",
              color: "#3f3f46", fontFamily: "inherit", letterSpacing: "0.5px",
            }}
          >
            RESET ALL DATA
          </button>
        ) : (
          <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
            <span style={{ fontSize: 11, color: "#fca5a5" }}>Are you sure?</span>
            <button
              onClick={resetAll}
              style={{
                padding: "6px 14px", fontSize: 10, border: "none", borderRadius: 4,
                cursor: "pointer", background: "#dc2626", color: "#fff", fontFamily: "inherit",
              }}
            >
              YES, RESET
            </button>
            <button
              onClick={() => setConfirmReset(false)}
              style={{
                padding: "6px 14px", fontSize: 10, border: "1px solid #3f3f46", borderRadius: 4,
                cursor: "pointer", background: "transparent", color: "#71717a", fontFamily: "inherit",
              }}
            >
              Cancel
            </button>
          </div>
        )}
        {onLogout && (
          <div style={{ marginTop: 12, display: "flex", alignItems: "center", justifyContent: "center", gap: 12 }}>
            {userEmail && <span style={{ fontSize: 10, color: "#3f3f46" }}>{userEmail}</span>}
            <button
              onClick={onLogout}
              style={{
                padding: "8px 16px", fontSize: 10, border: "1px solid #27272a",
                borderRadius: 5, cursor: "pointer", background: "transparent",
                color: "#3f3f46", fontFamily: "inherit", letterSpacing: "0.5px",
              }}
            >
              SIGN OUT
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AuthWrapper));
</script>
</body>
</html>
